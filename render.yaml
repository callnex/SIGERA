services:
  - type: web
    name: sigera-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    initialDeployHook: python manage.py bootstrap_media
    startCommand: gunicorn sigera.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/schema/
    disk:
      name: sigera-media
      mountPath: /var/data/media
      sizeGB: 5
    envVars:
      - key: DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: SERVE_MEDIA
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: sigera-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: sigera-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: sigera-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          type: web
          name: sigera-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: sigera-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: sigera-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sigera-db
