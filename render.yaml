services:
  - type: web
    name: sigera-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: sh -c "python manage.py migrate && python manage.py bootstrap_media && gunicorn sigera.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/schema/
    envVars:
      - key: DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: SERVE_MEDIA
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: sigera-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: sigera
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: sigera
          envVarKey: RENDER_EXTERNAL_URL
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          type: web
          name: sigera
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: sigera
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: sigera-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sigera-db
    plan: free
